name : "vpro-iac"
on:
    push:
        branches:
            - main
            - stage
        paths:
            - terraform/**
    pull_request:
        branches:
            - main
        paths:
            - terraform/**
    
env:
    AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
    AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
    BUCKET_TF_STATE: ${{secrets.BUCKET_TF_STATE}}
    EKS_CLUSTER: vpro-gitops-eks
    AWS_REGION: us-east-1

jobs:
    terraform:
        name: "Apply tf code changes"
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
                working-directory: ./terraform
        
        steps:
            - name : checkout src code
              uses: actions/checkout@v5

            - name: HashiCorp - Setup Terraform
              uses: hashicorp/setup-terraform@v4.0.0
              #with:
                #terraform_version: 1.6.3
            
            - name: terraform init
              id: init
              run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

            - name: tf fmt
              id: fmt
              run : terraform fmt -check

            - name: tf validate
              id: validate
              run: terraform validate

            - name: tf plan
              id: plan
              run: terraform plan -no-color -input=false -out planfile
              continue-on-error: true

            - name: tf plan status
              if: steps.plan.outcome == 'failure'
              run: exit 1

            - name: tf apply
              id: apply
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              run: terraform apply -auto-approve -input=false -parallelism=1 planfile
            
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.0.0
              with:
                aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
                aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
                aws-region: ${{env.AWS_REGION}}

            - name: Get kube config file
              id: kubeconfig
              if: steps.apply.outcome == 'success'
              run: aws eks update-kubeconfig --region ${{env.AWS_REGION}} --name ${{env.EKS_CLUSTER}}

            - name: Install ingress controller
              if: steps.apply.outcome == 'success' && steps.kubeconfig.outcome == 'success'
              run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/aws/deploy.yaml
